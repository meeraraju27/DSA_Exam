<!DOCTYPE html>
<html>
<head>
<title>Eurovision Predictor</title>
</head>
<body>
<h2>Eurovision Success Calculator</h2>

<form method="POST" action="/predict">
<p><strong>Song in English?</strong><br>
<select name="Song.In.English">
<option value="1">Yes</option>
<option value="0">No</option>
</select></p>

<p><strong>Artist Gender:</strong><br>
<select name="Artist.gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Both">Both</option>
</select></p>

<p><strong>Solo or Group:</strong><br>
<select name="Group.Solo">
<option value="Solo">Solo</option>
<option value="Group">Group</option>
</select></p>

<p><strong>Danceability (0-1):</strong><br>
<input type="number" name="danceability" min="0" max="1" step="0.1" value="0.6"></p>

<p><strong>Energy (0-1):</strong><br>
<input type="number" name="energy" min="0" max="1" step="0.1" value="0.7"></p>

<p><input type="submit" value="Predict Points"></p>
</form>

{% if prediction_text %}
<h3>Result: {{ prediction_text }}</h3>
{% endif %}

</body>
</html>
